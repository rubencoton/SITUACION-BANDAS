name: manual-report-run

on:
  workflow_dispatch:
    inputs:
      report_kind:
        description: "Tipo de informe a generar"
        required: true
        type: choice
        options:
          - weekly
          - monthly
          - annual

jobs:
  run-manual:
    runs-on: ubuntu-latest
    env:
      PROJECT_VISIBLE_NAME: SITUACION BANDAS
      PROJECT_SLUG: SITUACION-BANDAS
      COMPANY_NAME: Artes Buho
      AUTHOR_NAME: RUBEN COTON
      TIMEZONE: Europe/Madrid
      GOOGLE_SHEET_ID: 1YUOtxFLvryw_LmkoI2NB3FBeNucw0hFDdQa2qflr-xs
      USE_PUBLIC_SHEET_EXPORT: "true"
      GOOGLE_CLASP_PROFILE: ${{ secrets.GOOGLE_CLASP_PROFILE }}
      GOOGLE_CLASP_FILE: ${{ secrets.GOOGLE_CLASP_FILE }}
      GOOGLE_SERVICE_ACCOUNT_FILE: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_FILE }}
      EMAIL_ENABLED: "false"
      EMAIL_DRY_RUN_DEFAULT: "true"
      LOG_LEVEL: INFO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run report script
        run: |
          if [ "${{ github.event.inputs.report_kind }}" = "weekly" ]; then
            python scripts/generate_weekly_report.py
          elif [ "${{ github.event.inputs.report_kind }}" = "monthly" ]; then
            python scripts/generate_monthly_report.py
          else
            python scripts/generate_annual_report.py
          fi
